services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: approval_workflow
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/approval_workflow?schema=public"
      JWT_SECRET: "change-this-to-a-long-random-string"
      PORT: 4000
      FRONTEND_ORIGIN: "http://localhost:5173"
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/uploads
    # Runs migrations + seed once on container start, then starts the server.
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/server.js"

volumes:
  db-data:
  uploads-data:
